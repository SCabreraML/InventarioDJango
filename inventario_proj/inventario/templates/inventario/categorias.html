{% extends 'inventario/base.html' %}

{% block content %}
<h2>Categorías</h2>
<div class="row">
    <div class="col-md-6">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categorias %}
                <tr>
                    <td>{{ cat.id }}</td>
                    <td>{{ cat.nombre }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="col-md-6">
        <h3>Añadir Categoría</h3>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Añadir</button>
        </form>
    </div>
</div>
{% endblock %}
