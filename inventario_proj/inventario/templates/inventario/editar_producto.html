{% extends 'inventario/base.html' %}

{% block content %}
<h2>Editar Producto</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Código</label>
        <input type="text" name="codigo" class="form-control" value="{{ producto.codigo }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Categoría</label>
        <select name="categoria" class="form-select">
            <option value="">Seleccione...</option>
            {% for cat in categorias %}
            <option value="{{ cat.id }}" {% if producto.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Proveedor</label>
        <select name="proveedor" class="form-select">
            <option value="">Seleccione...</option>
            {% for prov in proveedores %}
            <option value="{{ prov.id }}" {% if producto.proveedor_id == prov.id %}selected{% endif %}>{{ prov.nombre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Stock Actual</label>
        <input type="number" name="stock_actual" class="form-control" value="{{ producto.stock_actual }}">
    </div>
    <button type="submit" class="btn btn-primary">Actualizar</button>
    <a href="{% url 'producto_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
