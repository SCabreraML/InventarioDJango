<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Inventario</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/productos/">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/usuarios/">Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/transacciones/">Transacciones</a>
                    </li>
                </ul>
                 {% if user.is_authenticated %}
        <span class="navbar-text text-light me-2">
            Hola, {{ user.username }}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light">Cerrar sesión</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-light">Login</a>
    {% endif %}
</div>
                <a href="/admin/" class="btn btn-light">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mt-5">
        <h1 class="text-center text-primary">Bienvenido al Sistema de Inventario</h1>
        <p class="text-center">Gestiona productos, usuarios y movimientos de inventario desde esta plataforma.</p>
    </div>
</body>
</html>
